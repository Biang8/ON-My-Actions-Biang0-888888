name: 'workflows日志自动清理'

on:
  schedule:
    - cron: '0 0 */3 * *'  # 每3天执行一次
  workflow_dispatch:      # 支持手动触发

jobs:
  del_workflow:
    runs-on: ubuntu-latest
    permissions:
      actions: write       # 必须加：赋予删除日志权限
    steps:
      - name: Delete workflow runs
        uses: GitRML/delete-workflow-runs@main
        with:
          retain_days: 3          # 只保留3天内的日志
          keep_minimum_runs: 0    # 关键：不强制保留任何记录
          delete_workflow_pattern: '*'  # 清理所有工作流
          delete_consecutive_pages: 20  # 多页清理，避免老日志残留
